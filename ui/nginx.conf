server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: unknown paths serve index.html so React Router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API traffic to the api container (Docker Compose service name).
    location /healthz {
        proxy_pass http://api:8000/healthz;
        proxy_set_header Host $host;
    }

    location /v1/ {
        proxy_pass http://api:8000/v1/;
        proxy_set_header Host $host;
        # SSE needs chunked transfer — disable buffering so tokens stream immediately.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header X-Accel-Buffering no;
    }
}
